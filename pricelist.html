<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokJoker48 - Pricelist Lengkap Joki JKT48</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css?v=2.3">
    <link rel="stylesheet" href="css/pricelist.css?v=1.0">
</head>
<body>
    <!-- Background glow elements -->
    <div class="glow-bg glow-1"></div>
    <div class="glow-bg glow-2"></div>

    <div class="container">
        <!-- Header Section -->
        <header class="header animate-fade-in">
            <div class="logo-area">
                <i class="fa-solid fa-mask-joker logo-icon"></i>
                <h1>JokJoker48</h1>
            </div>
            <p class="subtitle">PRICELIST JASA JOKI JKT48</p>
            <div class="header-divider"></div>
        </header>

        <!-- Tabs Navigation -->
        <div class="pricelist-tabs animate-fade-in" style="animation-delay: 0.1s;">
            <button class="pricelist-tab-btn active" data-tab="twoshot">
                <i class="fa-solid fa-ticket"></i> Joki 2-Shot
            </button>
            <button class="pricelist-tab-btn" data-tab="mng">
                <i class="fa-solid fa-handshake"></i> Meet & Greet (MnG)
            </button>
            <button class="pricelist-tab-btn" data-tab="videocall">
                <i class="fa-solid fa-video"></i> Video Call (VC)
            </button>
        </div>

        <!-- Universal Search Box -->
        <div class="search-container animate-fade-in" style="animation-delay: 0.15s;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="universalSearch" placeholder="Cari nama member...">
        </div>

        <!-- Pricelist Content Area -->
        <div id="pricelistContent" class="animate-fade-in" style="animation-delay: 0.2s;">
            <!-- Content will be populated by JavaScript -->
        </div>

        <!-- Back Navigation -->
        <div class="back-nav animate-fade-in" style="animation-delay: 0.25s;">
            <a href="index.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Kembali ke Form Pemesanan
            </a>
        </div>
    </div>

    <!-- JavaScript Data and Logic -->
    <script src="js/pricelist.js"></script>
</body>
</html>
