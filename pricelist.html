<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JokJoker48 - Pricelist Lengkap Joki JKT48</title>
    <!-- Google Fonts & FontAwesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific layout styles for Pricelist page */
        .pricelist-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .pricelist-tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .pricelist-tab-btn:hover {
            border-color: var(--color-gold);
            color: var(--color-gold);
        }
        
        .pricelist-tab-btn.active {
            background: var(--color-gold);
            color: #1e110b;
            border-color: var(--color-gold);
        }
        
        .search-container {
            max-width: 500px;
            margin: 0 auto 2.5rem auto;
            position: relative;
        }
        
        .search-container input {
            width: 100%;
            padding: 1rem 1.5rem 1rem 3rem;
            background: #170b05;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
        }
        
        .search-container input:focus {
            outline: none;
            border-color: var(--color-gold);
            background: #0d0502;
        }
        
        .search-container i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        
        .pricelist-section-title {
            text-align: center;
            font-family: var(--font-heading);
            color: var(--color-gold);
            font-size: 1.8rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .twoshot-price-grid, .mng-price-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        
        @media (min-width: 576px) {
            .twoshot-price-grid, .mng-price-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 992px) {
            .twoshot-price-grid, .mng-price-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .team-table-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.25rem 1rem;
            box-shadow: var(--shadow-card);
        }
        
        .team-table-header {
            font-family: var(--font-heading);
            color: var(--color-gold);
            font-size: 1.2rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            letter-spacing: 1px;
        }
        
        .table-row {
            display: flex;
            justify-content: space-between;
            padding: 0.65rem 0;
            border-bottom: 1px solid rgba(139, 90, 43, 0.05);
            font-size: 0.95rem;
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .member-name {
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .member-price {
            font-weight: 700;
            color: var(--color-gold);
        }
        
        .member-price.unknown {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Videocall Specific Grid */
        .vc-price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
        }
        
        .vc-tier-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
        }
        
        .vc-tier-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .vc-tier-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .vc-tier-price {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--color-gold);
        }
        
        .vc-member-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .vc-member-list::-webkit-scrollbar {
            width: 4px;
        }
        
        .vc-member-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
        
        .vc-member-item {
            padding: 0.5rem 0.75rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-primary);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.01);
        }
        
        .back-nav {
            text-align: center;
            margin-top: 3rem;
        }
        
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--color-gold);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s;
        }
        
        .btn-back:hover {
            background: var(--color-gold);
            color: #1e110b;
            border-color: var(--color-gold);
        }

        .no-results {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 3rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

        <!-- Tabs Navigation -->

            <button class="pricelist-tab-btn active" data-tab="twoshot">

        <!-- Universal Search Box -->
        <div class="search-container animate-fade-in" style="animation-delay: 0.15s;">
            <i class="fa-solid fa-magnifying-glass"></i>

        <!-- Back Navigation -->
        <div class="back-nav animate-fade-in" style="animation-delay: 0.25s;">

                { name: "Fatimah Azzahra", price2s: 60000, priceMng: 25000, vcTier: "45k" },
                { name: "Heidi Suyangga", price2s: 60000, priceMng: 25000, vcTier: "45k" },
                { name: "Maxine Faye", price2s: 60000, priceMng: 25000, vcTier: "45k" },
                { name: "Putry Jazyta", price2s: 60000, priceMng: 25000, vcTier: "45k" },
                { name: "Ralyne Van Irwan", price2s: 60000, priceMng: 25000, vcTier: "45k" },
                { name: "Sona Kalyana", price2s: 60000, priceMng: 25000, vcTier: "45k" }
            ]
        };

        // Tambahan data spesifik untuk member yang hanya ada di Videocall
        const vcExtraMembers = [
            { name: "Amanda Sukma", vcTier: "40k" },
            { name: "Chelsea Davina", vcTier: "40k" },
            { name: "Regina Willian", vcTier: "40k" }
        ];

        // Active State
        let currentTab = "twoshot";
        let searchKeyword = "";

        // Elements
        const pricelistContent = document.getElementById("pricelistContent");
        const universalSearch = document.getElementById("universalSearch");
        const tabButtons = document.querySelectorAll(".pricelist-tab-btn");

        // Format to IDR
        function formatRupiah(num) {
            if (num === null) return `<span class="member-price unknown">Tanya Admin</span>`;
            return `<span class="member-price">Rp ${num.toLocaleString('id-ID')}</span>`;
        }

        // Render functions
        function render() {
            pricelistContent.innerHTML = "";
            
            if (currentTab === "twoshot") {
                renderTeamBased("price2s");
            } else if (currentTab === "mng") {
                renderTeamBased("priceMng");
            } else if (currentTab === "videocall") {
                renderVcTiers();
            }
        }

        // Render 2-Shot and MnG lists (grouped by Team)
        function renderTeamBased(priceField) {
            const grid = document.createElement("div");
            grid.className = "twoshot-price-grid";
            
            const teams = ["Love", "Dream", "Passion", "Trainee"];
            let hasGlobalMatch = false;

            teams.forEach(team => {
                const members = memberData[team].filter(m => 
                    m.name.toLowerCase().includes(searchKeyword)
                );

                if (members.length > 0) {
                    hasGlobalMatch = true;
                    
                    const card = document.createElement("div");
                    card.className = "team-table-card";
                    card.innerHTML = `
                        <div class="team-table-header">
                            <span>Team ${team}</span>
                        </div>
                        <div class="team-table-rows">
                            ${members.map(m => `
                                <div class="table-row">
                                    <span class="member-name">${m.name}</span>
                                    ${formatRupiah(m[priceField])}
                                </div>
                            `).join("")}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (!hasGlobalMatch) {
                pricelistContent.innerHTML = `<div class="no-results">Member "${universalSearch.value}" tidak ditemukan.</div>`;
            } else {
                pricelistContent.appendChild(grid);
            }
        }

        // Render Videocall price tiers (grouped by price Rp40K, Rp45K, Rp70K, Rp85K)
        function renderVcTiers() {
            const grid = document.createElement("div");
            grid.className = "vc-price-grid";
            
            // Definisikan Tiers
            const tiers = [
                { label: "Rp 40.000", value: "40k" },
                { label: "Rp 45.000", value: "45k" },
                { label: "Rp 70.000", value: "70k" },
                { label: "Rp 85.000", value: "85k" }
            ];

            // Kumpulkan semua member dari data utama
            let allMembers = [];
            for (let team in memberData) {
                memberData[team].forEach(m => {
                    allMembers.push({ name: m.name, vcTier: m.vcTier });
                });
            }
            // Tambahkan member extra videocall
            vcExtraMembers.forEach(m => {
                allMembers.push(m);
            });

            // Filter berdasar search
            allMembers = allMembers.filter(m => 
                m.name.toLowerCase().includes(searchKeyword)
            );

            let hasGlobalMatch = false;

            tiers.forEach(tier => {
                const tierMembers = allMembers.filter(m => m.vcTier === tier.value);
                
                // Tambahkan ALL GEN 14 ke tier 45k jika mencari "gen" atau mencari kosong
                const is45kTier = tier.value === "45k";
                const matchGen14 = "all gen 14".includes(searchKeyword);
                
                if (tierMembers.length > 0 || (is45kTier && matchGen14)) {
                    hasGlobalMatch = true;
                    
                    const card = document.createElement("div");
                    card.className = "vc-tier-card";
                    
                    let gen14Html = "";
                    if (is45kTier && matchGen14) {
                        gen14Html = `<div class="vc-member-item" style="font-weight: 700; color: var(--color-gold);">ALL GEN 14</div>`;
                    }

                    card.innerHTML = `
                        <div class="vc-tier-header">
                            <span class="vc-tier-label">Biaya Joki</span>
                            <span class="vc-tier-price">${tier.label}</span>
                        </div>
                        <div class="vc-member-list">
                            ${gen14Html}
                            ${tierMembers.map(m => `
                                <div class="vc-member-item">${m.name}</div>
                            `).join("")}
                        </div>
                    `;
                    grid.appendChild(card);
                }
            });

            if (!hasGlobalMatch) {
                pricelistContent.innerHTML = `<div class="no-results">Member "${universalSearch.value}" tidak ditemukan.</div>`;
            } else {
                pricelistContent.appendChild(grid);
            }
        }

        // Set up event listeners
        universalSearch.addEventListener("input", (e) => {
            searchKeyword = e.target.value.toLowerCase().trim();
            render();
        });

        tabButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                tabButtons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentTab = btn.getAttribute("data-tab");
                render();
            });
        });

        // Init
        document.addEventListener("DOMContentLoaded", () => {
            render();
        });
    </script>
</body>
</html>
